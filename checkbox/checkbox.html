
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="checkbox.css">
</head>
<body>
    <div class="container">
        <div class="checkbox-container">
        <div>
            <input type="checkbox" id="student" class="occupation">
            <label for="student">student</label>
        </div>
        <div>
            <input type="checkbox" id="nysc" class="occupation">
            <label for="nysc">NYSC</label>
        </div>
        <div>
            <input type="checkbox" id="selfemployed" class="occupation">
            <label for="selfemployed">self-employed</label>
        </div>
        <div>
            <input type="checkbox" id="employed" class="occupation">
            <label for="employed">employed</label>
        </div>
        <div>
            <input type="checkbox" id="retired" class="occupation">
            <label for="retired">retired</label>
        </div>
        <div>
            <input type="checkbox" id="unemployed" class="occupation">
            <label for="unemployed">unemployed</label>
        </div>

    </div>
    <div class="radio-container">
        <div>
            <input type="radio" name="marital-status" id="single">
            <label for="single">single</label>
        </div>
        <div>
            <input type="radio" name="marital-status" id="married">
            <label for="married">married</label>
        </div>
        <div>
            <input type="radio" name="marital-status" id="engaged">
            <label for="engaged">engaged</label>
        </div>
        <div>
            <input type="radio" name="marital-status" id="talkingstage">
            <label for="talkingstage">talking stage</label>
        </div>
        <div>
            <input type="radio" name="marital-status" id="notinterested">
            <label for="notinterested">not interested</label>
        </div>
    </div>
    </div><br> <br>
    <button id="submit">submit</button>
    <h3 id="myresult"></h3>
    <h3 id="myoutcome"></h3>

    


    <script src="checkbox.js"></script>
</body>
</html>
